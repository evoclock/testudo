repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: detect-private-key
        # The sanitiser's own test fixtures contain canonical PEM key-header markers
        # (the RSA/EC private-key BEGIN lines) that the detection regexes must match;
        # exclude that fixture file so the hook does not false-positive on it.
        exclude: '^tests/test_sanitisers_patterns\.py$'

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-format
      - id: ruff
        args: [--fix]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: ^src/testudo/
        additional_dependencies:
          - pydantic>=2
          - httpx
          - duckdb
          - fastapi
          - uvicorn
        args: [--config-file=pyproject.toml]
